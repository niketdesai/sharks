<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- Primary Meta -->
    <title>Sharks Personnel Model</title>
    <meta name="description" content="San Jose Sharks roster and contract timeline" />

    <!-- Open Graph / SMS / iMessage -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sharks Personnel Model" />
    <meta property="og:description" content="San Jose Sharks roster and contract timeline" />
    <meta property="og:image" content="https://niketdesai.github.io/sharks/og-image.png" />
    <meta property="og:url" content="https://niketdesai.github.io/sharks/" />
    <meta property="og:site_name" content="Sharks Personnel Model" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sharks Personnel Model" />
    <meta name="twitter:description" content="San Jose Sharks roster and contract timeline" />
    <meta name="twitter:image" content="https://niketdesai.github.io/sharks/og-image.png" />

    <!-- Fonts — customize per project -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        min-height: 100vh;
        min-height: 100dvh;
        background: #0a0a0a;
        color: #f0ede5;
        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      /* Prevent iOS tap highlight */
      * { -webkit-tap-highlight-color: transparent; }
      /* Prevent pull-to-refresh on mobile */
      body { overscroll-behavior: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
